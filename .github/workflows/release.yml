name: Publish to PyPI

# Publishes when you cut a GitHub Release. Uses PyPI Trusted Publishing (OIDC) —
# NO API token or secret is stored in the repo. One-time setup on PyPI:
#   pypi.org -> your account -> Publishing -> Add a pending publisher
#     Project name:  agentwrapped
#     Owner:         sachincse
#     Repository:    agentwrapped
#     Workflow:      release.yml
#     Environment:   pypi
# Note: publish trace-lens FIRST (agentwrapped depends on it).

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
